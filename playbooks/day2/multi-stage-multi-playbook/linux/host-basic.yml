---
# =============================================================================
# multi-stage-multi-playbook / host-basic
#
# 호스트명과 가동시간을 수집한다.
# 멱등성: 완전 보장 (읽기 전용, 서버 변경 없음)
# =============================================================================

- name: multi-stage-multi-playbook / host-basic
  hosts: all
  gather_facts: false
  connection: ssh

  vars_files:
    - "{{ lookup('env', 'REPO_ROOT') }}/vault/linux.yml"

  tasks:

    - name: "host-basic | hostname"
      ansible.builtin.command: hostname
      changed_when: false
      register: _hostname_result

    - name: "host-basic | hostname result"
      ansible.builtin.debug:
        msg: "hostname: {{ _hostname_result.stdout }}"

    - name: "host-basic | uptime"
      ansible.builtin.command: uptime
      changed_when: false
      register: _uptime_result

    - name: "host-basic | uptime result"
      ansible.builtin.debug:
        msg: "uptime: {{ _uptime_result.stdout }}"
