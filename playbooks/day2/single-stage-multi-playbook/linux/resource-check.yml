---
# =============================================================================
# single-stage-multi-playbook / linux — resource-check.yml
#
# 서버 리소스 수집: CPU 로드, 메모리, 스왑, 프로세스 수.
# 읽기 전용 (서버 변경 없음)
# =============================================================================

- name: single-stage-multi-playbook / resource-check
  hosts: all
  gather_facts: true
  connection: ssh

  vars_files:
    - "{{ lookup('env', 'REPO_ROOT') }}/vault/linux.yml"

  vars:
    _host: "{{ inventory_hostname }}"
    _ip:   "{{ hostvars[inventory_hostname]['ansible_host'] | default(inventory_hostname) }}"

  tasks:

    # ── 1. CPU 로드 ──────────────────────────────────────────────────
    - name: "resource-check | load average"
      ansible.builtin.command: cat /proc/loadavg
      changed_when: false
      register: _load_result

    # ── 2. 메모리 상세 ───────────────────────────────────────────────
    - name: "resource-check | memory detail"
      ansible.builtin.command: free -m
      changed_when: false
      register: _mem_result

    # ── 3. 스왑 사용량 ───────────────────────────────────────────────
    - name: "resource-check | swap usage"
      ansible.builtin.command: swapon --show --noheadings
      changed_when: false
      failed_when: false
      register: _swap_result

    # ── 4. 실행 중인 프로세스 수 ──────────────────────────────────────
    - name: "resource-check | process count"
      ansible.builtin.shell: "ps aux --no-headers | wc -l"
      changed_when: false
      register: _proc_count

    # ── 5. 종합 요약 ─────────────────────────────────────────────────
    - name: "resource-check | SUMMARY"
      ansible.builtin.debug:
        msg: >-
          [{{ _host }}] ({{ _ip }})
          | Load: {{ _load_result.stdout }}
          | MEM Total: {{ ansible_memtotal_mb }}MB, Free: {{ ansible_memfree_mb }}MB
          | Swap: {{ ansible_swaptotal_mb }}MB total
          | Processes: {{ _proc_count.stdout | trim }}
