---
# =============================================================================
# 수집: 네트워크 정보
#
# 어댑터, 라우팅, DNS 정보를 수집한다.
# host별 부분 분기: suffix=4 → 라우팅 skipped, suffix=1 → DNS changed
# 읽기 전용 (서버 변경 없음)
# =============================================================================

- name: "로그파싱 / 네트워크-수집 [run={{ lookup('env', 'RUN_ID') | default('1') }}]"
  hosts: all
  gather_facts: false

  vars_files:
    - "{{ lookup('env', 'REPO_ROOT') }}/vault/windows.yml"

  vars:
    _host: "{{ inventory_hostname }}"
    _ip:   "{{ hostvars[inventory_hostname]['ansible_host'] | default(inventory_hostname) }}"
    _run:  "{{ lookup('env', 'RUN_ID') | default('1') }}"
    # ── host 분기용 ──────────────────────────────────────────
    _host_num: "{{ (inventory_hostname | regex_search('(\\d+)$', '\\1') | default(['0'], true) | first) | int }}"

  tasks:

    - name: "네트워크-수집 | 네트워크 어댑터"
      ansible.windows.win_shell: |
        Get-NetAdapter | Select-Object Name, Status, LinkSpeed |
          Format-Table -AutoSize | Out-String
      changed_when: false
      register: _net

    - name: "네트워크-수집 | 어댑터 결과"
      ansible.builtin.debug:
        msg: "[{{ _host }}] ({{ _ip }}) | {{ _net.stdout | trim }}"

    - name: "네트워크-수집 | 라우팅 테이블"
      ansible.windows.win_shell: |
        Get-NetRoute -AddressFamily IPv4 |
          Where-Object { $_.DestinationPrefix -ne '255.255.255.255/32' } |
          Select-Object DestinationPrefix, NextHop, InterfaceAlias -First 10 |
          Format-Table -AutoSize | Out-String
      changed_when: false
      when: _host_num != 4

    - name: "네트워크-수집 | DNS 서버"
      ansible.windows.win_shell: |
        Get-DnsClientServerAddress -AddressFamily IPv4 |
          Select-Object InterfaceAlias, ServerAddresses |
          Format-Table -AutoSize | Out-String
      changed_when: _host_num == 1
