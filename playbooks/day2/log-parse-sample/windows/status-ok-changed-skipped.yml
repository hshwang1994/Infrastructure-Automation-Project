---
# =============================================================================
# 상태 유도: ok, changed, skipped
#
# 모든 host에서 동일한 결과가 나온다.
# 읽기 전용 (서버 변경 없음)
# =============================================================================

- name: "로그파싱 / 상태-정상-변경-스킵 [run={{ lookup('env', 'RUN_ID') | default('1') }}]"
  hosts: all
  gather_facts: false

  vars_files:
    - "{{ lookup('env', 'REPO_ROOT') }}/vault/windows.yml"

  vars:
    _host: "{{ inventory_hostname }}"
    _ip:   "{{ hostvars[inventory_hostname]['ansible_host'] | default(inventory_hostname) }}"
    _run:  "{{ lookup('env', 'RUN_ID') | default('1') }}"

  tasks:

    - name: "상태-정상-변경-스킵 | 호스트명 확인 (ok)"
      ansible.windows.win_command: hostname
      changed_when: false

    - name: "상태-정상-변경-스킵 | 현재 시간 — changed"
      ansible.windows.win_shell: Get-Date -Format 'yyyy-MM-dd HH:mm:ss'
      changed_when: true

    - name: "상태-정상-변경-스킵 | 스킵 태스크"
      ansible.builtin.debug:
        msg: "this task is always skipped"
      when: false
