---
# =============================================================================
# 상태 유도: ok, changed, skipped
#
# 모든 host에서 동일한 결과가 나온다.
# 읽기 전용 (서버 변경 없음)
# =============================================================================

- name: "log-parse / status-ok-changed-skipped [run={{ lookup('env', 'RUN_ID') | default('1') }}]"
  hosts: all
  gather_facts: false
  connection: ssh

  vars_files:
    - "{{ lookup('env', 'REPO_ROOT') }}/vault/linux.yml"

  vars:
    _host: "{{ inventory_hostname }}"
    _ip:   "{{ hostvars[inventory_hostname]['ansible_host'] | default(inventory_hostname) }}"
    _run:  "{{ lookup('env', 'RUN_ID') | default('1') }}"

  tasks:

    - name: "status-ok-changed-skipped | ok - hostname check"
      ansible.builtin.command: hostname
      changed_when: false

    - name: "status-ok-changed-skipped | changed - date check"
      ansible.builtin.command: date
      changed_when: true

    - name: "status-ok-changed-skipped | skipped - disabled task"
      ansible.builtin.debug:
        msg: "this task is always skipped"
      when: false
