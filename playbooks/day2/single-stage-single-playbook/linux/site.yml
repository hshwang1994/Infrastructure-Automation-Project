---
# =============================================================================
# single-stage-single-playbook / linux
#
# 목적:
#   SSH 연결 확인용 최소 테스트. ansible.builtin.ping 모듈만 실행하여
#   대상 서버와의 연결 상태를 확인한다.
#
# 멱등성: 완전 보장 (읽기 전용, 서버 변경 없음)
# =============================================================================

- name: single-stage-single-playbook / linux
  hosts: all
  gather_facts: false
  connection: ssh

  vars_files:
    - "{{ lookup('env', 'REPO_ROOT') }}/vault/linux.yml"

  vars:
    _host: "{{ inventory_hostname }}"
    _ip:   "{{ hostvars[inventory_hostname]['ansible_host'] | default(inventory_hostname) }}"

  tasks:

    - block:
        - name: "single-stage-single-playbook | Ansible ping"
          ansible.builtin.ping:

        - name: "single-stage-single-playbook | RESULT"
          ansible.builtin.debug:
            msg: "[OK] {{ _host }} ({{ _ip }})"

      rescue:
        - name: "single-stage-single-playbook | RESULT (failed)"
          ansible.builtin.debug:
            msg: "[FAIL] {{ _host }} ({{ _ip }}) | {{ ansible_failed_result.msg | default('SSH 연결 실패') }}"
