- name: Install complete
  debug:
    msg: "{{ hostname }} install complete"

- name: Remove Custom ISO
  ansible.builtin.file:
    path: "/ansible-semaphore/windows/hosts/{{ hostname }}/{{ win_version }}-custom-{{ hostname }}.iso"
    state: absent

- name: Remove base-img directory
  ansible.builtin.file:
    path: "/ansible-semaphore/windows/hosts/{{ hostname }}/base-img"
    state: absent