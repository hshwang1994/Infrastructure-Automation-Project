  - name: Check Custom ISO exists
    stat:
      path: "/ansible-semaphore/windows/hosts/{{ hostname }}/{{ win_version }}-custom-{{ hostname }}.iso"
    register: custom_iso_stat
  
  - name: Create Windows 2022 Custom ISO
    shell: |
      output_iso="/ansible-semaphore/windows/hosts/{{ hostname }}/{{ win_version }}-custom-{{ hostname }}.iso"    
      xorriso -as mkisofs -iso-level 3 -full-iso9660-filenames -J -joliet-long -r -V "WINDOWS-2022" -o $output_iso -b boot/etfsboot.com -no-emul-boot -boot-load-size 8 -boot-info-table -eltorito-alt-boot -e efi/microsoft/boot/efisys_noprompt.bin /ansible-semaphore/windows/hosts/{{ hostname }}/base-img
    when: not custom_iso_stat.stat.exists