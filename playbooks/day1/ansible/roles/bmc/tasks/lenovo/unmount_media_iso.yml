- name: LENOVO virtual media unmount (EXT1)
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Managers/1/VirtualMedia/EXT1"
    method: PATCH
    user: "{{ username }}"
    password: "{{ password }}"
    body_format: json
    body:
      Inserted: false
      Image: null
    status_code: [200, 202, 204, 400]
    force_basic_auth: yes
    validate_certs: false
  register: eject2_result


- name: Check eject all media debug
  ansible.builtin.debug:
    msg: "{{ eject2_result }}"
