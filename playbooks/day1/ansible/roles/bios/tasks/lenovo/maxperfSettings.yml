- name: Step1. Lenovo BIOS Settings Maximum Performance
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Systems/1/Bios/Pending"
    method: PATCH
    user: "{{ username }}"
    password: "{{ password }}"
    body:
      Attributes:
        "OperatingModes_ChooseOperatingMode": "{{ OperatingMode_STP1 }}" ## CustomMode / MaximumPerformance
#       "Processors_IntelVirtualizationTechnology": "{{ Intel_VT }}" ## Enabled / Disabled
#       "Processors_SVMMode": "Enabled" ## AMD CPU Attribute
#       "Processors_GlobalC_stateControl": "Disabled"
#       "Processors_DFC_States": "Disabled"
#       "Processors_MONITORMWAIT": "Enabled"
#       "SecureBootConfiguration_SecureBootSetting": "Enabled"
    body_format: json
    status_code: [200, 202, 204]
    force_basic_auth: yes
    validate_certs: false
  register: Bios_settings_result

- name: Show BIOS settings results
  ansible.builtin.debug:
    msg:
      Status: "{{ Bios_settings_result.json['@Message.ExtendedInfo'][0].Message }}"
      OperatingModes: "{{ Bios_settings_result.json.Attributes.OperatingModes_ChooseOperatingMode }}"
#     Processors_IntelVirtualizationTechnology: "{{ Bios_settings_result.json.Attributes.Processors_IntelVirtualizationTechnology }}"
#     Processors_SVMMode: "{{ Bios_settings_result.json.Attributes.Processors_SVMMode }}" ## AMD CPU Attribute
#     Processors_GlobalC_stateControl: "{{ Bios_settings_result.json.Attributes.Processors_GlobalC_stateControl }}"
#     Processors_DFC_States: "{{ Bios_settings_result.json.Attributes.Processors_DFC_States }}"
#     Processors_MONITORMWAIT: "{{ Bios_settings_result.json.Attributes.Processors_MONITORMWAIT }}"
#     SecureBootConfiguration_SecureBootSetting: "{{ Bios_settings_result.json.Attributes.SecureBootConfiguration_SecureBootSetting }}"
#     msg: "{{ Bios_settings_result }}"

- name: Get pending BIOS settings after patch
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Systems/1/Bios/Pending"
    method: GET
    validate_certs: no
    force_basic_auth: yes
    user: "{{ username }}"
    password: "{{ password }}"
  register: pending_after_patch

- name: Lenovo BIOS Settings Maximum Performance > Reboot step
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Systems/1/Actions/ComputerSystem.Reset"
    method: POST
    user: "{{ username }}"
    password: "{{ password }}"
    body:
      ResetType: ForceRestart
    body_format: json
    status_code: [200, 202, 204]
    force_basic_auth: yes
    validate_certs: false
  register: reboot_result
  when: >
    (pending_after_patch.json.Attributes.OperatingModes_ChooseOperatingMode | default('') | lower)
    ==
    (OperatingMode_STP1 | lower)

- name: Waiting for BIOS value to change on system
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Systems/1/Bios"
    method: GET
    validate_certs: no
    force_basic_auth: yes
    user: "{{ username }}"
    password: "{{ password }}"
  register: apply_bios_result
  until: >
    (apply_bios_result.json.Attributes.OperatingModes_ChooseOperatingMode | default('') | lower)
    ==
    (OperatingMode_STP1 | lower)
  retries: 20
  delay: 20

- name: Waiting for initialize server status [6 minutes]
  ansible.builtin.pause:
    minutes: 6

- name: Get current BIOS settings after reboot
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Systems/1/Bios"
    method: GET
    validate_certs: no
    force_basic_auth: yes
    user: "{{ username }}"
    password: "{{ password }}"
  register: current_bios_result

- name: Compare requested values with applied BIOS values
  set_fact:
    compare_result:
      OperatingMode:
        requested: "{{ OperatingMode_STP1 }}"
        applied: "{{ current_bios_result.json.Attributes.OperatingModes_ChooseOperatingMode | default('N/A') }}"
        matched: "{{ (OperatingMode_STP1 | string | lower) == (current_bios_result.json.Attributes.OperatingModes_ChooseOperatingMode | default('') | string | lower) }}"

- name: Complete Successfully BIOS Settings
  ansible.builtin.debug:
    msg:
      OperatingMode: >-
        requested={{ compare_result.OperatingMode.requested }},
        applied={{ compare_result.OperatingMode.applied }},
        result={{ 'Successfully Changed bios value' if compare_result.OperatingMode.matched else 'Fail to changed bios value' }}

- name: Fail if any BIOS setting was not applied correctly
  fail:
    msg: "BIOS settings do not match requested value lists."
  when: >
    not compare_result.OperatingMode.matched