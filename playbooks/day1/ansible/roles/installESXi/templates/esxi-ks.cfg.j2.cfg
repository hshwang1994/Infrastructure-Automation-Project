# ESXi PERC H330 Raid ctl driver update
#esxcli software vib install -v http://10.50.42.234/cfg/driver-pk/lsi_mr3/vib20/lsi-mr3/BCM_bootbank_lsi-mr3_7.730.01.00-1OEM.800.1.0.20613240.vib

# SSH Enable
vim-cmd hostsvc/enable_ssh
vim-cmd hostsvc/start_ssh

# ESXi shell Enable
vim-cmd hostsvc/enable_esx_shell
vim-cmd hostsvc/start_esx_shell

# ESXi NTP Settings & Enable
esxcli system ntp set -e=no
esxcli system ntp set -s={{ ntp_server }}
esxcli system ntp set -e=yes

# ipv6 Disable
esxcli network ip set --ipv6-enabled=false

# Suffix remove
esxcli network ip dns search remove --domain {{ dns_name }}

# Generate ESXi Certificate
/sbin/generate-certificates

# reboot
reboot