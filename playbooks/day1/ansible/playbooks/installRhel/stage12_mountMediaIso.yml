---
- hosts: localhost
  gather_facts: true
  connection: local

  vars_files:
    - ../../group_vars/all.yml

  vars:
    inventory: "{{ lookup('env', 'INVENTORY_JSON') | from_json }}"
    host:   "{{ inventory[0] }}"
    hostname: "{{ host.hostname | default('') }}"
    dns_name:      "{{ host.dns_name      | default('') }}"
    service_ip:            "{{ host.service_ip            | default('') }}"
    bmc_ip:   "{{ host.bmc_ip   | default('') }}"
    gateway:       "{{ host.gateway       | default('') }}"
    dns_server:    "{{ host.dns_server    | default('') }}"
    ntp_server:    "{{ host.ntp_server    | default('') }}"
    vlan_id:       "{{ host.vlan_id       | default('') }}"
    rhel_version:  "{{ host.rhel_version  | default('') }}"
    username:      "{{ host.username      | default('') }}"
    vendor:        "{{ host.vendor        | default('') }}"
    vendor_name:
      lenovo:
        role: bmc
        task: lenovo/mount_media.yml
      
      hp:
        role: bmc
        task: hp/mount_media.yml

  tasks:
    - name: Validate vendor variable
      ansible.builtin.assert:
        that:
          - vendor is defined
          - vendor | length > 0
          - vendor in vendor_name.keys()
        fail_msg: "Invalid vendor value: {{ vendor | default('undefined') }}. Support vendors: {{ vendor_name.keys() | join(', ') }}"

    - name: "Umount media & Mount Network file RHEL 8.10 ISO"
      include_role:
        name: "{{ vendor_name[vendor].role }}"
        tasks_from: "{{ vendor_name[vendor].task }}"
